document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    // Nested page bundles (iframe targets). Each ships ONCE, in the ROOT
    // document's manifest; frame srcs carry an about:blank#<uuid> marker
    // instead of a substitutable uuid. Every document mints the blobs for
    // its OWN frames — from local text at the root, or text obtained from
    // its DIRECT parent over the relay protocol below — so each frame
    // navigation stays same-origin with its initiator and a deduped page
    // loads at any depth on any host, including a file:// download's
    // opaque origins (where a blob minted by one document cannot be
    // navigated to by another).
    const pageOrderEl = document.querySelector('script[type="__bundler/page_order"]');
    const pageOrder = pageOrderEl ? JSON.parse(pageOrderEl.textContent) : [];
    const pageSet = new Set(pageOrder);
    const pageTexts = {};

    // ── Nested-page text protocol (parent-chain relay) ──
    // Page bundles ship once, in the ROOT document's manifest. Every
    // document mints the blobs for its OWN frames, obtaining page text
    // through a strict parent-chain relay: a document only ever SENDS to
    // its direct parent (which, for every document the publisher's own
    // runtime minted, is another publisher document) and only ACCEPTS
    // text from that direct parent; requests from below are honored only
    // for the document's own child frames, and the ROOT never sends
    // upward at all. That last rule is load-bearing: the artifact host's
    // frame-ancestors allows claude.ai (and friends) to frame an
    // artifact, so window.top can be a FOREIGN document — a top-addressed
    // protocol would hand page uuids to that ancestor and accept forged
    // "page text" from it, minting attacker HTML as an artifact-origin
    // blob document. The chain never touches the ancestor: requests stop
    // at the root, replies are origin-addressed per hop (never '*' when
    // an origin exists), and both directions are origin-gated (on https
    // a foreign sender's origin can never equal this document's; in
    // opaque contexts — file:// — everything serializes as 'null', where
    // an embedded EXTERNAL frame still fails the gate by carrying its
    // own real origin, and a sandboxed child of such a frame is excluded
    // by the own-child-frames check plus uuid unguessability). Shape is
    // deny-by-default: one request form, one reply form, no error
    // replies.
    // window.origin is the SERIALIZED SECURITY origin ('null' in opaque
    // contexts such as a sandboxed preview iframe) — location.origin is
    // computed from the URL and stays 'https://…' even when the document
    // is sandboxed, which would misgate every opaque chain.
    const OWN_TARGET = /^https?:[/][/]/.test(window.origin || '')
      ? window.origin
      : '*';
    function trustedOrigin(e) {
      if (e.origin === window.origin) return true; // https chains; opaque==opaque
      // file:// trees: Chrome serializes the file document's origin as
      // 'file://' while the blob: documents it mints serialize as 'null',
      // so the two legitimate shapes can never string-match — accept the
      // pair in both directions. https origins never serialize as either,
      // and sender identity (own child frame / direct parent) is checked
      // separately.
      return (
        (e.origin === 'null' &&
          (window.origin === 'file://' ||
            window.location.protocol === 'file:')) ||
        (/^file:/.test(e.origin) && window.origin === 'null')
      );
    }
    // Non-empty only in the root document (nested bundles ship an empty
    // island), so it doubles as the root marker: the root answers from
    // local text and treats a miss as authoritative — never relaying to
    // its (possibly foreign) parent.
    const isPageRoot = pageOrder.length > 0;
    const blobUrls = {};
    const resourceBlobs = {};
    const UUID_SHAPE = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/;
    const pendingFrames = {}; // uuid -> [{el, frag}] awaiting text for own frames
    const pendingRelays = {}; // uuid -> [childWindow] awaiting text to pass down
    function mountPage(el, frag, text) {
      const pageBlob = new Blob([text], { type: 'text/html' });
      const u = URL.createObjectURL(pageBlob);
      resourceBlobs[u] = pageBlob;
      el.src = u + frag;
    }
    function deliverPage(uuid, text) {
      const frames = pendingFrames[uuid];
      delete pendingFrames[uuid];
      if (frames) for (const f of frames) mountPage(f.el, f.frag, text);
      const relays = pendingRelays[uuid];
      delete pendingRelays[uuid];
      if (relays) {
        for (const cw of relays) {
          try { cw.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
        }
      }
    }
    function ownFrameWindows() {
      const out = [];
      for (const f of Array.from(document.querySelectorAll('iframe'))) {
        try { if (f.contentWindow) out.push(f.contentWindow); } catch (err) { /* detached */ }
      }
      return out;
    }
    window.addEventListener('message', function (e) {
      const d = e.data;
      if (!d || typeof d !== 'object' || !e.source) return;
      // Origin gate first; the structural checks below (own-child-frames
      // for requests, direct-parent + solicited-uuid for replies, the
      // root's never-relay rule) are what hold in fully opaque chains
      // where origin strings can't discriminate — a sandboxed root's
      // FOREIGN wrapper still fails all three even though both serialize
      // as real-vs-'null' rather than matching.
      if (!trustedOrigin(e)) return;
      if (typeof d.__bundler_need === 'string' && UUID_SHAPE.test(d.__bundler_need)) {
        // Requests are honored only for this document's own child frames.
        if (ownFrameWindows().indexOf(e.source) < 0) return;
        const uuid = d.__bundler_need;
        const text = pageTexts[uuid];
        if (typeof text === 'string') {
          try { e.source.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
          return;
        }
        if (isPageRoot || window.parent === window) return; // authoritative miss
        const waiting = pendingRelays[uuid];
        if (waiting) {
          if (waiting.indexOf(e.source) < 0) waiting.push(e.source);
          return;
        }
        // Never-answered uuids would otherwise accumulate forever under a
        // request spray; past the cap (far above any real page count) new
        // relays are dropped rather than remembered.
        if (Object.keys(pendingRelays).length >= 128) return;
        pendingRelays[uuid] = [e.source];
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      } else if (
        typeof d.__bundler_page === 'string' &&
        UUID_SHAPE.test(d.__bundler_page) &&
        typeof d.__bundler_text === 'string'
      ) {
        // The shape test is load-bearing beyond tidiness: the solicited
        // check below uses the in operator, which matches prototype keys
        // ('__proto__', 'constructor') — an unshaped key would reach
        // deliverPage and throw, painting the error banner.
        // Text is accepted only from the direct parent — the document
        // that minted this one.
        if (e.source !== window.parent || window.parent === window) return;
        if (!(d.__bundler_page in pendingFrames) && !(d.__bundler_page in pendingRelays)) return;
        deliverPage(d.__bundler_page, d.__bundler_text);
      }
    });

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (pageSet.has(uuid)) {
          pageTexts[uuid] = new TextDecoder().decode(finalBytes);
          return;
        }
        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    // Page uuids have no blob here — they ride inside about:blank#<uuid>
    // frame markers the pass below resolves after the swap.
    for (const uuid of uuids) {
      if (pageSet.has(uuid)) continue;
      template = template.split(uuid).join(blobUrls[uuid]);
    }

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);

    // Resolve page-frame markers: mint this document's own blob for each
    // framed page — from local text when this is the root, otherwise by
    // asking the direct parent over the relay protocol above. An
    // unanswered request leaves the frame on about:blank, the same
    // degraded state as a refused embed.
    {
      const MARKER = /^about:blank#([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})(#.*)?$/;
      const needed = [];
      for (const el of Array.from(document.querySelectorAll('iframe'))) {
        const m = MARKER.exec(el.getAttribute('src') || '');
        if (!m) continue;
        const text = pageTexts[m[1]];
        if (typeof text === 'string') {
          mountPage(el, m[2] || '', text);
        } else if (window.parent !== window && !isPageRoot) {
          const had = pendingFrames[m[1]];
          (pendingFrames[m[1]] = had || []).push({ el: el, frag: m[2] || '' });
          if (!had) needed.push(m[1]);
        }
      }
      for (const uuid of needed) {
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      }
    }

    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

n  <div style=\"position:absolute;inset:0;background:repeating-linear-gradient(135deg,rgba(0,0,0,0.10) 0 22px,transparent 22px 44px);\"><\u002Fdiv>\n  <div style=\"position:absolute;top:0;left:0;right:0;height:12px;background:repeating-linear-gradient(90deg,var(--ink) 0 26px,var(--amber) 26px 52px);\"><\u002Fdiv>\n  <div style=\"position:absolute;right:-30px;bottom:-70px;font-family:'Barlow',sans-serif;font-weight:800;font-size:340px;line-height:0.8;color:rgba(0,0,0,0.12);\">!<\u002Fdiv>\n  <div style=\"position:relative;z-index:2;\">\n    <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:22px;\">\n      <span style=\"display:inline-flex;width:34px;height:34px;align-items:center;justify-content:center;background:#fff;border-radius:6px;\">\n        <svg width=\"20\" height=\"20\" sc-camel-view-box=\"0 0 24 24\"><path d=\"M9 2h6v7h7v6h-7v7H9v-7H2V9h7z\" fill=\"#D81E2C\"><\u002Fpath><\u002Fsvg>\n      <\u002Fspan>\n      <span style=\"font-family:'Barlow Condensed',sans-serif;font-weight:600;letter-spacing:0.22em;font-size:13px;text-transform:uppercase;opacity:0.9;\">EMS World · Feature<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"font-family:'Barlow Condensed',sans-serif;font-weight:700;letter-spacing:0.1em;font-size:16px;text-transform:uppercase;color:var(--amber);margin-bottom:10px;\">When is Epinephrine Dangerous?<\u002Fdiv>\n    <h1 style=\"margin:0;font-weight:900;font-size:52px;line-height:1.02;\">何時，腎上腺素才算「<span style=\"color: var(--amber);\">危險<\u002Fspan>」？<\u002Fh1>\n    <p style=\"margin:20px 0 0;font-size:18px;font-weight:500;line-height:1.55;opacity:0.95;\">拆解過敏性休克現場治療中，最常見、也最致命的一種猶豫。<\u002Fp>\n    <div style=\"margin-top:28px;padding-top:20px;border-top:2px solid rgba(255,255,255,0.35);display:flex;align-items:center;gap:14px;\">\n      <div style=\"width:44px;height:44px;border-radius:50%;background:#fff;color:var(--red);display:flex;align-items:center;justify-content:center;font-weight:800;font-family:'Barlow',sans-serif;font-size:17px;\">FH<\u002Fdiv>\n      <div style=\"line-height:1.3;\">\n        <div style=\"font-weight:700;font-size:16px;\">Frances Hall, NREMT-P<\u002Fdiv>\n        <div style=\"font-family:'Barlow Condensed',sans-serif;letter-spacing:0.12em;font-size:13px;opacity:0.85;\">EMS World 2026<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- SCENARIO -->\n<section style=\"padding:40px 24px;\">\n  <div style=\"display:flex;align-items:center;gap:12px;margin-bottom:14px;\"><span style=\"font-family:'Barlow Condensed',sans-serif;font-weight:700;letter-spacing:0.18em;font-size:14px;color:var(--red);\">情境 · SCENARIO<\u002Fspan><span style=\"flex:1;height:2px;background:var(--red);\"><\u002Fspan><\u002Fdiv>\n  <h2 style=\"margin:0 0 14px;font-weight:900;font-size:28px;line-height:1.2;\">主訴「呼吸困難」的 78 歲女性<\u002Fh2>\n  <div style=\"display:flex;flex-wrap:wrap;gap:8px;margin-bottom:22px;\">\n    <span style=\"background:var(--ink);color:var(--paper);font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:600;padding:5px 12px;border-radius:999px;\">輔助生活機構<\u002Fspan>\n    <span style=\"background:var(--ink);color:var(--paper);font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:600;padding:5px 12px;border-radius:999px;\">到院前評估<\u002Fspan>\n    <span style=\"background:var(--red);color:#fff;font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:600;padding:5px 12px;border-radius:999px;\">23 種已知致命過敏<\u002Fspan>\n  <\u002Fdiv>\n  <div style=\"display:flex;flex-direction:column;gap:12px;\">\n    <div style=\"display:flex;gap:14px;background:var(--card);border:2px solid var(--ink);border-radius:14px;padding:18px;\"><span style=\"font-family:'Barlow',sans-serif;font-weight:800;font-size:26px;color:var(--red);line-height:1;\">01<\u002Fspan><p style=\"margin:0;font-size:16px;line-height:1.5;font-weight:500;\">抵達時，一位神情不適的女性，每一口吐氣都伴隨可聽見的<b style=\"color:var(--red);\">喘鳴<\u002Fb>，<b style=\"color:var(--red);\">蕁麻疹<\u002Fb>沿著背部與手臂蔓延。<\u002Fp><\u002Fdiv>\n    <div style=\"display:flex;gap:14px;background:var(--card);border:2px solid var(--ink);border-radius:14px;padding:18px;\"><span style=\"font-family:'Barlow',sans-serif;font-weight:800;font-size:26px;color:var(--red);line-height:1;\">02<\u002Fspan><p style=\"margin:0;font-size:16px;line-height:1.5;font-weight:500;\">照護者說：「她<b>昨天<\u002Fb>才開始服用一種新的抗黴菌藥。」<\u002Fp><\u002Fdiv>\n    <div style=\"display:flex;gap:14px;background:var(--card);border:2px solid var(--ink);border-radius:14px;padding:18px;\"><span style=\"font-family:'Barlow',sans-serif;font-weight:800;font-size:26px;color:var(--red);line-height:1;\">03<\u002Fspan><p style=\"margin:0;font-size:16px;line-height:1.5;font-weight:500;\">病歷寫明：她對 <b style=\"color:var(--red);font-family:'Barlow',sans-serif;font-size:22px;\">23<\u002Fb> 種藥物有致命性過敏。<\u002Fp><\u002Fdiv>\n    <div style=\"display:flex;gap:12px;align-items:center;background:var(--red);color:#fff;border-radius:14px;padding:18px;\"><svg width=\"26\" height=\"26\" sc-camel-view-box=\"0 0 24 24\"><path d=\"M12 3v18M3 12h18\" stroke=\"#fff\" stroke-width=\"3\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg><p style=\"margin:0;font-size:18px;font-weight:800;line-height:1.3;\">臨床判斷 —— 這是<span style=\"color: var(--amber);\">過敏性休克<\u002Fspan>。<\u002Fp><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- CONFLICT -->\n<section style=\"padding:40px 24px;background:var(--card);\">\n  <div style=\"display:flex;align-items:center;gap:12px;margin-bottom:14px;\"><span style=\"font-family:'Barlow Condensed',sans-serif;font-weight:700;letter-spacing:0.18em;font-size:14px;color:var(--red);\">現場衝突 · THE HESITATION<\u002Fspan><span style=\"flex:1;height:2px;background:var(--red);\"><\u002Fspan><\u002Fdiv>\n  <div style=\"font-family:'Barlow Condensed',sans-serif;letter-spacing:0.1em;font-size:13px;color:var(--muted);text-transform:uppercase;margin-bottom:12px;\">搭檔阻止你抽藥，低聲說——<\u002Fdiv>\n  <div style=\"display:flex;flex-direction:column;gap:10px;margin-bottom:20px;\">\n    <div style=\"background:#fff;border:2px solid var(--ink);border-radius:14px 14px 14px 3px;padding:16px 18px;font-size:16px;font-weight:500;line-height:1.4;\">「她有<b>充血性心衰竭<\u002Fb>病史。」<\u002Fdiv>\n    <div style=\"background:#fff;border:2px solid var(--ink);border-radius:14px 14px 14px 3px;padding:16px 18px;font-size:16px;font-weight:500;line-height:1.4;\">「她根本<b>算不上<\u002Fb>過敏性休克。」<\u002Fdiv>\n    <div style=\"background:#fff;border:2px solid var(--ink);border-radius:14px 14px 14px 3px;padding:16px 18px;font-size:16px;font-weight:500;line-height:1.4;\">「送醫院就好，<b>別把她的心臟搞得更糟<\u002Fb>。」<\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"background:var(--ink);color:var(--paper);border-radius:16px;padding:24px 22px;\">\n    <div style=\"font-family:'Barlow Condensed',sans-serif;letter-spacing:0.12em;font-size:13px;color:var(--amber);text-transform:uppercase;margin-bottom:12px;\">你的回應<\u002Fdiv>\n    <p style=\"margin:0;font-size:24px;font-weight:700;line-height:1.35;\">過敏性休克就像懷孕——只有「<span style=\"color:var(--amber);\">是<\u002Fspan>」或「<span style=\"color:var(--amber);\">不是<\u002Fspan>」。<\u002Fp>\n    <p style=\"margin:14px 0 0;font-size:16px;font-weight:400;line-height:1.5;opacity:0.9;\">沒有一種「輕微到不必治療」的過敏性休克。<\u002Fp>\n  <\u002Fdiv>\n  <div style=\"margin-top:20px;text-align:center;font-size:20px;font-weight:800;color:var(--red);\">該給，還是不給？<\u002Fdiv>\n<\u002Fsection>\n\n<!-- REFRAME -->\n<section style=\"padding:44px 24px;background:var(--ink);color:var(--paper);position:relative;overflow:hidden;\">\n  <div style=\"position:absolute;bottom:0;left:0;right:0;height:12px;background:repeating-linear-gradient(90deg,var(--red) 0 26px,var(--amber) 26px 52px);\"><\u002Fdiv>\n  <div style=\"font-family:'Barlow Condensed',sans-serif;letter-spacing:0.16em;font-size:14px;color:var(--amber);text-transform:uppercase;margin-bottom:14px;\">重新框定問題<\u002Fdiv>\n  <h2 style=\"margin:0 0 24px;font-weight:900;font-size:34px;line-height:1.15;\">真正的危機，是腎上腺素被<span style=\"color:var(--red);\">「用得太少」<\u002Fspan>。<\u002Fh2>\n  <div style=\"border-left:5px solid var(--amber);padding-left:16px;margin-bottom:18px;\"><p style=\"margin:0;font-size:18px;font-weight:600;line-height:1.5;\">肌肉注射（IM）腎上腺素，是<b style=\"color:var(--amber);\">唯一<\u002Fb>能逆轉過敏性休克的治療。<\u002Fp><\u002Fdiv>\n  <div style=\"border-left:5px solid var(--red);padding-left:16px;\"><p style=\"margin:0;font-size:18px;font-weight:600;line-height:1.5;\">然而即使已知有致命過敏，仍僅約 <b style=\"font-family:'Barlow',sans-serif;color:var(--red);font-size:30px;\">30%<\u002Fb> 的病人真正接受治療。<\u002Fp><\u002Fdiv>\n<\u002Fsection>\n\n<!-- DATA hospitalization -->\n<section style=\"padding:40px 24px;\">\n  <div style=\"display:flex;align-items:center;gap:12px;margin-bottom:10px;\"><span style=\"font-family:'Barlow Condensed',sans-serif;font-weight:700;letter-spacing:0.18em;font-size:14px;color:var(--red);\">實證 · 01<\u002Fspan><span style=\"flex:1;height:2px;background:var(--red);\"><\u002Fspan><\u002Fdiv>\n  <h2 style=\"margin:0 0 4px;font-weight:900;font-size:28px;line-height:1.2;\">越早給藥，越少住院<\u002Fh2>\n  <p style=\"margin:0 0 22px;font-size:15px;color:var(--muted);font-weight:500;\">住院比例 · 依腎上腺素給予時機<\u002Fp>\n  <div style=\"display:flex;align-items:flex-end;gap:24px;height:220px;margin-bottom:20px;\">\n    <div style=\"flex:1;display:flex;flex-direction:column;align-items:center;height:100%;justify-content:flex-end;\">\n      <div style=\"font-family:'Barlow',sans-serif;font-weight:800;font-size:34px;color:var(--red);\">43%<\u002Fdiv>\n      <div style=\"width:100%;background:var(--red);border-radius:10px 10px 0 0;height:170px;\"><\u002Fdiv>\n      <div style=\"margin-top:12px;font-size:15px;font-weight:700;text-align:center;\">在<b>急診<\u002Fb>才給藥<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"flex:1;display:flex;flex-direction:column;align-items:center;height:100%;justify-content:flex-end;\">\n      <div style=\"font-family:'Barlow',sans-serif;font-weight:800;font-size:34px;color:var(--ink);\">17%<\u002Fdiv>\n      <div style=\"width:100%;background:var(--ink);border-radius:10px 10px 0 0;height:67px;\"><\u002Fdiv>\n      <div style=\"margin-top:12px;font-size:15px;font-weight:700;text-align:center;\">到院前即給藥<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"background:var(--card);border:2px solid var(--ink);border-radius:14px;padding:18px;\"><p style=\"margin:0;font-size:16px;font-weight:600;line-height:1.5;\">到院前給藥，讓住院率<b style=\"color: var(--red);\">下降超過一半<\u002Fb>。<br>「早期」指的是：在抵達急診前就已給予。<\u002Fp><div style=\"margin-top:10px;font-family:'Barlow Condensed',sans-serif;letter-spacing:0.1em;font-size:12px;color:var(--muted);\">來源：Fleming et al., 2015<\u002Fdiv><\u002Fdiv>\n<\u002Fsection>\n\n<!-- DATA mortality -->\n<section style=\"padding:44px 24px;background:var(--red);color:#fff;position:relative;overflow:hidden;\">\n  <div style=\"position:absolute;inset:0;background:repeating-linear-gradient(135deg,rgba(0,0,0,0.07) 0 22px,transparent 22px 44px);\"><\u002Fdiv>\n  <div style=\"position:relative;z-index:2;\">\n    <div style=\"display:flex;align-items:center;gap:12px;margin-bottom:12px;\"><span style=\"font-family:'Barlow Condensed',sans-serif;font-weight:700;letter-spacing:0.18em;font-size:14px;\">實證 · 02<\u002Fspan><span style=\"flex:1;height:2px;background:rgba(255,255,255,0.6);\"><\u002Fspan><\u002Fdiv>\n    <h2 style=\"margin:0 0 10px;font-weight:900;font-size:28px;line-height:1.2;\">越早給藥，越少死亡<\u002Fh2>\n    <div style=\"font-family:'Barlow',sans-serif;font-weight:800;font-size:120px;line-height:0.9;letter-spacing:-0.02em;\">14%<\u002Fdiv>\n    <p style=\"margin:14px 0 0;font-size:19px;font-weight:700;line-height:1.4;\">在死於過敏性休克的病人中，<br>僅此比例曾在心跳停止<b style=\"color: var(--amber);\">之前<\u002Fb>接受過腎上腺素。<\u002Fp>\n    <p style=\"margin:14px 0 0;font-size:15px;font-weight:400;line-height:1.5;opacity:0.95;\">換句話說——絕大多數的死亡，發生在腎上腺素<b>還沒被使用<\u002Fb>之前。<\u002Fp>\n    <div style=\"margin-top:14px;font-family:'Barlow Condensed',sans-serif;letter-spacing:0.1em;font-size:12px;opacity:0.85;\">來源：Pumphrey, 2000<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- WHY hesitate -->\n<section style=\"padding:40px 24px;\">\n  <div style=\"display:flex;align-items:center;gap:12px;margin-bottom:12px;\"><span style=\"font-family:'Barlow Condensed',sans-serif;font-weight:700;letter-spacing:0.18em;font-size:14px;color:var(--red);\">為什麼會猶豫？<\u002Fspan><span style=\"flex:1;height:2px;background:var(--red);\"><\u002Fspan><\u002Fdiv>\n  <h2 style=\"margin:0 0 20px;font-weight:900;font-size:28px;line-height:1.2;\">低度使用的三個常見理由<\u002Fh2>\n  <div style=\"display:flex;flex-direction:column;gap:12px;\">\n    <div style=\"background:var(--card);border:2px solid var(--ink);border-radius:14px;padding:20px;\"><div style=\"display:flex;align-items:baseline;gap:12px;\"><span style=\"font-family:'Barlow',sans-serif;font-weight:800;font-size:24px;color:var(--muted);\">A<\u002Fspan><span style=\"font-size:19px;font-weight:800;\">診斷困難<\u002Fspan><\u002Fdiv><p style=\"margin:10px 0 0;font-size:15px;line-height:1.5;color:var(--muted);font-weight:500;\">過敏性休克表現千變萬化，主訴不易一眼判定。<\u002Fp><\u002Fdiv>\n    <div style=\"background:var(--card);border:2px solid var(--ink);border-radius:14px;padding:20px;\"><div style=\"display:flex;align-items:baseline;gap:12px;\"><span style=\"font-family:'Barlow',sans-serif;font-weight:800;font-size:24px;color:var(--muted);\">B<\u002Fspan><span style=\"font-size:19px;font-weight:800;\">費用考量<\u002Fspan><\u002Fdiv><p style=\"margin:10px 0 0;font-size:15px;line-height:1.5;color:var(--muted);font-weight:500;\">病人對於自費更換腎上腺素注射筆的成本有合理顧慮。<\u002Fp><\u002Fdiv>\n    <div style=\"background:var(--red);color:#fff;border-radius:14px;padding:20px;position:relative;overflow:hidden;\"><div style=\"position:absolute;top:-14px;right:-4px;font-family:'Barlow',sans-serif;font-weight:800;font-size:100px;opacity:0.16;\">!<\u002Fdiv><div style=\"position:relative;z-index:2;\"><div style=\"display:flex;align-items:baseline;gap:12px;\"><span style=\"font-family:'Barlow',sans-serif;font-weight:800;font-size:24px;color:var(--amber);\">C<\u002Fspan><span style=\"font-size:19px;font-weight:800;\">害怕造成傷害<\u002Fspan><\u002Fdiv><p style=\"margin:10px 0 0;font-size:15px;line-height:1.5;\">擔心腎上腺素傷害病人——尤其是有<b>心臟病史<\u002Fb>者。這正是本文要正面拆解的迷思。<\u002Fp><\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ADVERSE RARE -->\n<section style=\"padding:40px 24px;background:var(--card);\">\n  <div style=\"display:flex;align-items:center;gap:12px;margin-bottom:10px;\"><span style=\"font-family:'Barlow Condensed',sans-serif;font-weight:700;letter-spacing:0.18em;font-size:14px;color:var(--red);\">實證 · 03<\u002Fspan><span style=\"flex:1;height:2px;background:var(--red);\"><\u002Fspan><\u002Fdiv>\n  <h2 style=\"margin:0 0 4px;font-weight:900;font-size:26px;line-height:1.25;\">不良反應：既罕見，後果也遠比過敏性休克輕<\u002Fh2>\n  <p style=\"margin:0 0 20px;font-size:14px;color:var(--muted);font-weight:500;\">IM 腎上腺素用於過敏性休克的不良事件比例<\u002Fp>\n  <div style=\"display:flex;flex-direction:column;gap:12px;\">\n    <div style=\"background:#fff;border:2px solid var(--ink);border-radius:14px;padding:18px;display:flex;align-items:center;gap:18px;\"><div style=\"font-family:'Barlow',sans-serif;font-weight:800;font-size:44px;color:var(--red);line-height:0.9;flex-shrink:0;\">&lt;2%<\u002Fdiv><p style=\"margin:0;font-size:15px;line-height:1.45;font-weight:600;\">245 例 IM 注射中僅 3 例：1 例心絞痛、2 例高血壓。<\u002Fp><\u002Fdiv>\n    <div style=\"background:#fff;border:2px solid var(--ink);border-radius:14px;padding:18px;display:flex;align-items:center;gap:18px;\"><div style=\"font-family:'Barlow',sans-serif;font-weight:800;font-size:44px;color:var(--red);line-height:0.9;flex-shrink:0;\">3.5%<\u002Fdiv><p style=\"margin:0;font-size:15px;line-height:1.45;font-weight:600;\">即使只看<b>高齡<\u002Fb>族群，心臟不良事件也僅 3.5%。<\u002Fp><\u002Fdiv>\n    <div style=\"background:#fff;border:2px solid var(--ink);border-radius:14px;padding:18px;display:flex;align-items:center;gap:18px;\"><div style=\"font-family:'Barlow',sans-serif;font-weight:800;font-size:44px;color:var(--red);line-height:0.9;flex-shrink:0;\">3%<\u002Fdiv><p style=\"margin:0;font-size:15px;line-height:1.45;font-weight:600;\">另一研究：僅 3%（高血壓、心電圖變化、胸痛）。<\u002Fp><\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"margin-top:14px;background:var(--ink);color:var(--paper);border-radius:14px;padding:18px;font-size:17px;font-weight:700;line-height:1.4;\">高血壓與心絞痛，都比「未治療的過敏性休克」更安全、更不易造成長期傷害。<\u002Fdiv>\n<\u002Fsection>\n\n<!-- OMISSION BIAS -->\n<section style=\"padding:44px 24px;background:var(--ink);color:var(--paper);position:relative;overflow:hidden;\">\n  <div style=\"position:absolute;top:0;left:0;right:0;height:12px;background:repeating-linear-gradient(90deg,var(--red) 0 26px,var(--amber) 26px 52px);\"><\u002Fdiv>\n  <div style=\"font-family:'Barlow Condensed',sans-serif;letter-spacing:0.16em;font-size:14px;color:var(--amber);text-transform:uppercase;margin:8px 0 14px;\">認知偏誤 · OMISSION BIAS<\u002Fdiv>\n  <h2 style=\"margin:0;font-weight:900;font-size:32px;line-height:1.15;\">「不給藥」，<span style=\"color:var(--red);\">不是<\u002Fspan>中立的安全牌。<\u002Fh2>\n  <p style=\"margin:20px 0 0;font-size:19px;font-weight:500;line-height:1.5;\">選擇<font color=\"#e8930c\"><b>保留<\u002Fb><\u002Ffont>一種藥，和選擇<font color=\"#e8930c\"><b>使用<\u002Fb><\u002Ffont>它，同樣是一個重大的決定。<\u002Fp>\n  <p style=\"margin:14px 0 0;font-size:15px;font-weight:400;line-height:1.55;opacity:0.9;\">這種偏誤既普遍又危險——但只要你在自己與同事身上意識到它，就會變得容易克服。<\u002Fp>\n<\u002Fsection>\n\n<!-- IV vs IM -->\n<section style=\"padding:40px 24px;\">\n  <div style=\"display:flex;align-items:center;gap:12px;margin-bottom:12px;\"><span style=\"font-family:'Barlow Condensed',sans-serif;font-weight:700;letter-spacing:0.18em;font-size:14px;color:var(--red);\">關鍵區分 · IV vs. IM<\u002Fspan><span style=\"flex:1;height:2px;background:var(--red);\"><\u002Fspan><\u002Fdiv>\n  <h2 style=\"margin:0 0 20px;font-weight:900;font-size:28px;line-height:1.2;\">決定安全的，是「途徑」<\u002Fh2>\n  <div style=\"display:flex;flex-direction:column;gap:14px;\">\n    <div style=\"border:3px solid var(--ink);border-radius:16px;padding:22px;background:var(--card);\">\n      <div style=\"display:flex;align-items:center;gap:10px;\"><span style=\"background:var(--ink);color:var(--paper);font-family:'Barlow',sans-serif;font-weight:800;font-size:15px;padding:5px 12px;border-radius:6px;\">IM 肌肉注射<\u002Fspan><span style=\"font-size:16px;font-weight:800;color:#1F8A4C;\">安全<\u002Fspan><\u002Fdiv>\n      <div style=\"margin-top:16px;font-family:'Barlow',sans-serif;font-weight:800;font-size:38px;color:var(--ink);line-height:1;\">3,500 <span style=\"font-size:19px;\">mg/kg<\u002Fspan><\u002Fdiv>\n      <p style=\"margin:8px 0 0;font-size:15px;font-weight:600;line-height:1.4;\">大鼠 IM 的 LD50——是正常劑量的<b>數千倍<\u002Fb>。<\u002Fp>\n      <p style=\"margin:12px 0 0;font-size:13px;line-height:1.5;color:var(--muted);font-weight:500;\">注射筆劑量 ≤ 0.3 mg · 抽取劑量 0.01 mg/kg。除非把全郡的腎上腺素都打進去，否則很難傷到病人。<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"border:3px solid var(--red);border-radius:16px;padding:22px;background:#fff;\">\n      <div style=\"display:flex;align-items:center;gap:10px;\"><span style=\"background:var(--red);color:#fff;font-family:'Barlow',sans-serif;font-weight:800;font-size:15px;padding:5px 12px;border-radius:6px;\">IV 靜脈注射<\u002Fspan><span style=\"font-size:16px;font-weight:800;color:var(--red);\">高風險<\u002Fspan><\u002Fdiv>\n      <div style=\"margin-top:16px;font-family:'Barlow',sans-serif;font-weight:800;font-size:38px;color:var(--red);line-height:1;\">150 <span style=\"font-size:19px;\">µg/kg<\u002Fspan><\u002Fdiv>\n      <p style=\"margin:8px 0 0;font-size:15px;font-weight:600;line-height:1.4;\">IV 的 LD50——不到 IM 的 <b style=\"color:var(--red);\">0.01%<\u002Fb>。<\u002Fp>\n      <p style=\"margin:12px 0 0;font-size:13px;line-height:1.5;color:var(--muted);font-weight:500;\">同樣一種藥，換一條途徑，安全邊際相差<b>上萬倍<\u002Fb>。<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- HARM FROM IV -->\n<section style=\"padding:40px 24px;background:var(--card);\">\n  <div style=\"display:flex;align-items:center;gap:12px;margin-bottom:12px;\"><span style=\"font-family:'Barlow Condensed',sans-serif;font-weight:700;letter-spacing:0.18em;font-size:14px;color:var(--red);\">傷害的來源<\u002Fspan><span style=\"flex:1;height:2px;background:var(--red);\"><\u002Fspan><\u002Fdiv>\n  <h2 style=\"margin:0 0 18px;font-weight:900;font-size:28px;line-height:1.2;\">傷害，幾乎全來自靜脈注射<\u002Fh2>\n  <div style=\"background:var(--red);color:#fff;border-radius:16px;padding:22px;margin-bottom:12px;\"><div style=\"font-family:'Barlow',sans-serif;font-weight:800;font-size:48px;line-height:0.9;\">99.6%<\u002Fdiv><p style=\"margin:10px 0 0;font-size:16px;font-weight:600;line-height:1.4;\">勝算比顯示：不良腎上腺素事件源自 <b>IV 給藥<\u002Fb>。每一個能查到的傷害案例，全都來自靜脈途徑。<\u002Fp><\u002Fdiv>\n  <div style=\"background:var(--ink);color:var(--paper);border-radius:16px;padding:22px;\"><div style=\"font-family:'Barlow Condensed',sans-serif;letter-spacing:0.12em;font-size:13px;color:var(--amber);text-transform:uppercase;margin-bottom:10px;\">真實案例<\u002Fdiv><p style=\"margin:0;font-size:17px;font-weight:600;line-height:1.5;\">澳洲一名 65 歲女性，因流程將霧化用的腎上腺素誤以 <b style=\"color:var(--amber);font-family:'Barlow',sans-serif;\">5 mg<\u002Fb> 靜脈注射——一個驚人的過量劑量——因而造成<b style=\"color:var(--amber);\">心臟受損<\u002Fb>。<\u002Fp><p style=\"margin:14px 0 0;padding-top:12px;border-top:2px solid rgba(255,255,255,0.18);font-size:14px;opacity:0.85;font-weight:500;line-height:1.5;\">傷害的根源不是「腎上腺素」，而是<b>錯誤的途徑與劑量<\u002Fb>。<\u002Fp><\u002Fdiv>\n<\u002Fsection>\n\n<!-- RULE -->\n<section style=\"padding:44px 24px;background:var(--red);color:#fff;position:relative;overflow:hidden;\">\n  <div style=\"position:absolute;inset:0;background:repeating-linear-gradient(135deg,rgba(0,0,0,0.07) 0 22px,transparent 22px 44px);\"><\u002Fdiv>\n  <div style=\"position:relative;z-index:2;\">\n    <div style=\"font-family:'Barlow Condensed',sans-serif;letter-spacing:0.16em;font-size:14px;text-transform:uppercase;margin-bottom:12px;\">帶回現場的準則 · THE RULE<\u002Fdiv>\n    <h2 style=\"margin:0 0 20px;font-weight:900;font-size:28px;line-height:1.2;\">一條簡單的安全準則<\u002Fh2>\n    <div style=\"display:flex;flex-direction:column;gap:12px;\">\n      <div style=\"background:rgba(0,0,0,0.20);border-radius:14px;padding:18px;\"><div style=\"font-family:'Barlow',sans-serif;font-weight:800;font-size:20px;color:var(--amber);\">大劑量 IV<\u002Fdiv><p style=\"margin:8px 0 0;font-size:16px;font-weight:600;line-height:1.4;\">只保留給<b>已無生命跡象<\u002Fb>（心跳停止）的病人。<\u002Fp><\u002Fdiv>\n      <div style=\"background:rgba(0,0,0,0.20);border-radius:14px;padding:18px;\"><div style=\"font-family:'Barlow',sans-serif;font-weight:800;font-size:20px;color:var(--amber);\">其餘一律<\u002Fdiv><p style=\"margin:8px 0 0;font-size:16px;font-weight:600;line-height:1.4;\">選擇 <b>IM<\u002Fb>，或極其謹慎、極小劑量的 IV。<\u002Fp><\u002Fdiv>\n      <div style=\"background:#fff;color:var(--ink);border-radius:14px;padding:18px;\"><div style=\"font-family:'Barlow',sans-serif;font-weight:800;font-size:20px;color:var(--red);\">結果<\u002Fdiv><p style=\"margin:8px 0 0;font-size:16px;font-weight:700;line-height:1.4;\">遵守這點，你<b>幾乎不可能<\u002Fb>傷害你的病人。<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- CONCLUSION -->\n<section style=\"padding:40px 24px;\">\n  <div style=\"display:flex;align-items:center;gap:12px;margin-bottom:18px;\"><span style=\"font-family:'Barlow Condensed',sans-serif;font-weight:700;letter-spacing:0.18em;font-size:14px;color:var(--red);\">情境結局 · RESOLUTION<\u002Fspan><span style=\"flex:1;height:2px;background:var(--red);\"><\u002Fspan><\u002Fdiv>\n  <div style=\"display:flex;flex-direction:column;gap:14px;margin-bottom:20px;\">\n    <div style=\"display:flex;gap:12px;\"><span style=\"color:var(--red);font-family:'Barlow',sans-serif;font-weight:800;font-size:20px;\">→<\u002Fspan><p style=\"margin:0;font-size:17px;font-weight:600;line-height:1.5;\">你完成注射，並立即為她接上<b>心電監測<\u002Fb>。<\u002Fp><\u002Fdiv>\n    <div style=\"display:flex;gap:12px;\"><span style=\"color:var(--red);font-family:'Barlow',sans-serif;font-weight:800;font-size:20px;\">→<\u002Fspan><p style=\"margin:0;font-size:17px;font-weight:600;line-height:1.5;\">症狀在<b style=\"color:var(--red);\">兩分鐘內<\u002Fb>緩解，無需追加任何劑量。<\u002Fp><\u002Fdiv>\n    <div style=\"display:flex;gap:12px;\"><span style=\"color:var(--red);font-family:'Barlow',sans-serif;font-weight:800;font-size:20px;\">→<\u002Fspan><p style=\"margin:0;font-size:17px;font-weight:600;line-height:1.5;\">隔天早晨，你發現搭檔正在（徒勞地）尋找一個「IM 腎上腺素造成傷害」的案例。<\u002Fp><\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"background:var(--ink);color:var(--paper);border-radius:16px;padding:24px 22px;\">\n    <svg width=\"100%\" height=\"46\" sc-camel-view-box=\"0 0 400 70\" sc-camel-preserve-aspect-ratio=\"none\" style=\"display:block;margin-bottom:16px;\"><polyline points=\"0,35 90,35 110,35 130,10 150,60 170,20 190,35 400,35\" fill=\"none\" stroke=\"#E8930C\" stroke-width=\"5\" stroke-linejoin=\"round\" stroke-linecap=\"round\"><\u002Fpolyline><\u002Fsvg>\n    <p style=\"margin:0;font-size:22px;font-weight:700;line-height:1.35;\">改變的種子，已經種下。<\u002Fp>\n    <p style=\"margin:12px 0 0;font-size:15px;font-weight:400;line-height:1.5;opacity:0.88;\">正確的臨床選擇，往往也是最需要勇氣的那一個。<\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- TAKE-HOME -->\n<section style=\"padding:44px 24px;background:var(--ink);color:var(--paper);position:relative;overflow:hidden;\">\n  <div style=\"position:absolute;bottom:0;left:0;right:0;height:12px;background:repeating-linear-gradient(90deg,var(--red) 0 26px,var(--amber) 26px 52px);\"><\u002Fdiv>\n  <div style=\"font-family:'Barlow Condensed',sans-serif;letter-spacing:0.16em;font-size:14px;color:var(--amber);text-transform:uppercase;margin-bottom:8px;\">帶走的重點 · TAKE-HOME<\u002Fdiv>\n  <h2 style=\"margin:0 0 22px;font-weight:900;font-size:28px;line-height:1.2;\">五件現場一定要記得的事<\u002Fh2>\n  <div style=\"display:flex;flex-direction:column;gap:14px;\">\n    <div style=\"display:flex;gap:14px;align-items:center;border-bottom:2px solid rgba(255,255,255,0.14);padding-bottom:12px;\"><span style=\"font-family:'Barlow',sans-serif;font-weight:800;font-size:30px;color:var(--red);\">1<\u002Fspan><p style=\"margin:0;font-size:16px;font-weight:600;line-height:1.4;\">過敏性休克沒有「輕重之分」——<b>符合就治療<\u002Fb>。<\u002Fp><\u002Fdiv>\n    <div style=\"display:flex;gap:14px;align-items:center;border-bottom:2px solid rgba(255,255,255,0.14);padding-bottom:12px;\"><span style=\"font-family:'Barlow',sans-serif;font-weight:800;font-size:30px;color:var(--red);\">2<\u002Fspan><p style=\"margin:0;font-size:16px;font-weight:600;line-height:1.4;\">IM 腎上腺素是<b>唯一<\u002Fb>逆轉治療，且<b>早給救命<\u002Fb>。<\u002Fp><\u002Fdiv>\n    <div style=\"display:flex;gap:14px;align-items:center;border-bottom:2px solid rgba(255,255,255,0.14);padding-bottom:12px;\"><span style=\"font-family:'Barlow',sans-serif;font-weight:800;font-size:30px;color:var(--red);\">3<\u002Fspan><p style=\"margin:0;font-size:16px;font-weight:600;line-height:1.4;\">不良反應僅約 2–3.5%，且<b>比不治療更安全<\u002Fb>。<\u002Fp><\u002Fdiv>\n    <div style=\"display:flex;gap:14px;align-items:center;border-bottom:2px solid rgba(255,255,255,0.14);padding-bottom:12px;\"><span style=\"font-family:'Barlow',sans-serif;font-weight:800;font-size:30px;color:var(--red);\">4<\u002Fspan><p style=\"margin:0;font-size:16px;font-weight:600;line-height:1.4;\">危險幾乎專屬於 <b>IV 途徑與過量<\u002Fb>——IM 請放心。<\u002Fp><\u002Fdiv>\n    <div style=\"display:flex;gap:14px;align-items:center;background:var(--red);border-radius:12px;padding:14px 16px;\"><span style=\"font-family:'Barlow',sans-serif;font-weight:800;font-size:30px;color:var(--amber);\">5<\u002Fspan><p style=\"margin:0;font-size:16px;font-weight:700;line-height:1.4;\">「不給」也是一個決定——<b>別讓猶豫成為傷害<\u002Fb>。<\u002Fp><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- REFERENCES -->\n<section style=\"padding:40px 24px 56px;\">\n  <div style=\"display:flex;align-items:center;gap:12px;margin-bottom:14px;\"><span style=\"font-family:'Barlow Condensed',sans-serif;font-weight:700;letter-spacing:0.18em;font-size:14px;color:var(--red);\">參考文獻 · WORKS CITED<\u002Fspan><span style=\"flex:1;height:2px;background:var(--red);\"><\u002Fspan><\u002Fdiv>\n  <div style=\"display:flex;flex-direction:column;gap:10px;font-size:13px;line-height:1.5;color:var(--muted);\">\n    <div>1 · Fleming JT, Clark S, Camargo CA, Rudders SA. (2015). <i>J Allergy Clin Immunol Pract<\u002Fi>, 3(1), 57–62.<\u002Fdiv>\n    <div>2 · Pumphrey. (2000). Lessons for management of anaphylaxis from a study of fatal reactions. <i>Clin Exp Allergy<\u002Fi>, 30(8), 1144–1150.<\u002Fdiv>\n    <div>3 · Prince BT, Mikhail I, Stukus DR. (2018). Underuse of epinephrine for anaphylaxis. <i>J Asthma Allergy<\u002Fi>, 11, 143–151.<\u002Fdiv>\n    <div>4 · Bernstein DI, Blaiss M, Dellon ES. (2025). Benefits of Epinephrine for Anaphylaxis Outweigh Potential Harm. <i>J Allergy Clin Immunol Pract<\u002Fi>.<\u002Fdiv>\n    <div>5 · Mayo Clinic. Epinephrine (injection route).<\u002Fdiv>\n    <div>6 · Callum J, Rivlin M, Carroll P. (2020). IV epinephrine overdose in prehospital anaphylaxis. <i>BMJ Case Rep<\u002Fi>, 13(1).<\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"margin-top:20px;border-top:2px solid var(--ink);padding-top:16px;\">\n    <div style=\"font-size:15px;font-weight:600;line-height:1.5;\">原文：Frances Hall, NREMT-P ·「<a href=\"https://www.hmpgloballearningnetwork.com/site/emsworld/feature/when-epinephrine-dangerous\" target=\"_blank\" rel=\"noopener\" style=\"color:var(--red);text-decoration:underline;text-underline-offset:3px;\">When is Epinephrine Dangerous?<\u002Fa>」· EMS World, 2026<\u002Fdiv>\n    <div style=\"margin-top:8px;font-family:'Barlow Condensed',sans-serif;letter-spacing:0.1em;font-size:12px;color:var(--muted);\">本簡報為重點摘要整理，處置流程請依所屬單位指引<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n\n\n<\u002Fbody><\u002Fhtml>"
